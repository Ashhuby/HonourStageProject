name: fitness_app
description: "An offline-first fitness app with note-taking and rest timers."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  ffi: ^2.1.2

  # Logic & State Management
  flutter_riverpod: ^2.5.1
  riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # Local Database (Offline-First)
  drift: ^2.21.0                
  sqlite3_flutter_libs: ^0.5.22 
  path_provider: ^2.1.2        
  path: ^1.9.0

  # Data Modeling & UI Utilities
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  fl_chart: ^0.66.2

  # Notifications & Feedback
  flutter_local_notifications: ^18.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # Code Generation Tools
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.4
  riverpod_analyzer_utils: ^0.5.5
  drift_dev: ^2.21.2
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  
flutter:
  uses-material-design: true
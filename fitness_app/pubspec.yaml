name: fitness_app
description: "An offline-first fitness app with note-taking and rest timers."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.10.0 

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Logic & State Management
  flutter_riverpod: ^3.0.0-dev.0
  riverpod_annotation: ^3.0.0-dev.0

  # Local Database (Offline-First)
  drift: ^2.16.0               
  sqlite3_flutter_libs: ^0.5.22 
  path_provider: ^2.1.2        
  path: ^1.9.0

  # Data Modeling & UI Utilities
  freezed_annotation: ^2.4.1   
  json_annotation: ^4.8.1
  flutter_local_notifications: ^17.0.0 
  fl_chart: ^0.66.0            

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation Tools (The "Builders")
  build_runner: ^2.4.8
  riverpod_generator: ^3.0.0-dev.0
  drift_dev: ^2.16.0
  freezed: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
name: Analyze & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
      - name: Install dependencies
        working-directory: fitness_app
        run: flutter pub get
      - name: Analyze
        working-directory: fitness_app
        run: flutter analyze --no-fatal-infos
      - name: Test
        working-directory: fitness_app
        run: flutter test
